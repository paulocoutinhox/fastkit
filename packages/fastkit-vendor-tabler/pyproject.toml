[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-vendor-tabler"
version = "1.0.0"
description = "Vendored Tabler (Bootstrap) core CSS/JS for the FastKit admin."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = []

[project.entry-points."fastkit.assets"]
"tabler" = "fastkit_vendor_tabler.assets"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_vendor_tabler"]
