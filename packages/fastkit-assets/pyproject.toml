[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-assets"
version = "1.0.0"
description = "FastKit — assets, variants, uploads and image processing."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = ["fastkit-core", "fastkit-db", "fastkit-storage", "pillow>=10.0"]

[project.entry-points."fastkit.apps"]
"fastkit.assets" = "fastkit_assets.app:AssetsApp"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_assets"]
