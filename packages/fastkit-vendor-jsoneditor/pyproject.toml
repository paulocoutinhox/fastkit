[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-vendor-jsoneditor"
version = "1.0.0"
description = "Vendored JSONEditor for the FastKit admin."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = []

[project.entry-points."fastkit.assets"]
"jsoneditor" = "fastkit_vendor_jsoneditor.assets"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_vendor_jsoneditor"]
