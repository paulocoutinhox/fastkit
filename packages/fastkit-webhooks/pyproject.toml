[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-webhooks"
version = "1.0.0"
description = "FastKit — webhook inbox with signature verification."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = ["fastkit-core", "fastkit-db"]

[project.entry-points."fastkit.apps"]
"fastkit.webhooks" = "fastkit_webhooks.app:WebhooksApp"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_webhooks"]
