[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-vendor-jquery"
version = "1.0.0"
description = "Vendored jQuery for the FastKit admin."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = []

[project.entry-points."fastkit.assets"]
"jquery" = "fastkit_vendor_jquery.assets"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_vendor_jquery"]
