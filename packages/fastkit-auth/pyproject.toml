[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-auth"
version = "1.0.0"
description = "FastKit — sessions, password auth, JWT, rate limiting and reCAPTCHA."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "fastkit-core",
    "fastkit-db",
    "fastkit-accounts",
    "fastkit-tenancy",
    "argon2-cffi>=23.1",
    "pyjwt>=2.8",
]

[project.optional-dependencies]
recaptcha = ["httpx>=0.27"]

[project.entry-points."fastkit.apps"]
"fastkit.auth" = "fastkit_auth.app:AuthApp"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_auth"]
