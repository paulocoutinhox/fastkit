[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fastkit-permissions"
version = "1.0.0"
description = "FastKit — roles, groups, permissions and authorization."
readme = "DOCS.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = ["fastkit-core", "fastkit-db", "fastkit-tenancy", "fastkit-accounts"]

[project.entry-points."fastkit.apps"]
"fastkit.permissions" = "fastkit_permissions.app:PermissionsApp"

[tool.hatch.build.targets.wheel]
packages = ["src/fastkit_permissions"]
