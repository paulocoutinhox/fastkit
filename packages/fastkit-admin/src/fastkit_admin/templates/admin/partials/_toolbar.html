<div class="card mb-3">
  <div class="card-body">
    <div class="row g-2">
      {% if search_fields %}
      <div class="col-md">
        <form class="fk-search-form" data-testid="grid-search-form">
          <input type="search" name="search" value="{{ search }}" class="form-control" placeholder="{{ t('grid.search') }}" data-testid="grid-search">
        </form>
      </div>
      {% endif %}
      <div class="col-md-auto ms-md-auto">
        <div class="btn-list">
          {% if has_filters %}<button type="button" class="btn fk-filter-toggle" data-testid="grid-filters"><i class="ti ti-filter me-1"></i>{{ t('grid.filters') }}</button>{% endif %}
          {% for action in collection_actions %}<button type="button" class="btn fk-collection-action" data-action="{{ action.name }}">{{ action.label }}</button>{% endfor %}
          {% if has_bulk %}
          <div class="dropdown fk-bulk d-none" data-testid="bulk-menu">
            <button class="btn dropdown-toggle" data-bs-toggle="dropdown"><span class="fk-bulk-count">0</span> {{ t('grid.selected') }}</button>
            <div class="dropdown-menu dropdown-menu-end">
              {% for action in bulk_actions %}<button type="button" class="dropdown-item fk-bulk-action" data-action="{{ action.name }}">{{ action.label }}</button>{% endfor %}
              {% if flags.can_delete %}<button type="button" class="dropdown-item text-danger fk-bulk-delete" data-testid="bulk-delete"><i class="ti ti-trash me-2"></i>{{ t('grid.delete') }}</button>{% endif %}
            </div>
          </div>
          {% endif %}
          {% if flags.can_create %}<a class="btn btn-primary" href="{{ path }}/{{ resource }}/new" data-testid="grid-new"><i class="ti ti-plus me-1"></i>{{ t('grid.new') }}</a>{% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
