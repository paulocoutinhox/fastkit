<div class="fk-lookup" data-field="{{ field.name }}" data-depends-on="{{ field.depends_on | join(',') }}" data-min-chars="{{ field.min_chars }}" data-initial-limit="{{ field.initial_limit }}" data-search-limit="{{ field.search_limit }}" data-value="{{ field.value if field.value is not none else '' }}">
  <input type="hidden" name="{{ field.name }}" value="{{ field.value if field.value is not none else '' }}" data-testid="field-{{ field.name }}">
</div>
